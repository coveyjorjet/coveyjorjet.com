name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Astro site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Type check
        run: npx astro check
        continue-on-error: true   # non-blocking — warnings shouldn't kill the build

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Verify dist output
        run: |
          if [ ! -f dist/index.html ]; then
            echo "::error::dist/index.html not found — build may have failed"
            exit 1
          fi
          echo "dist contents:"
          ls -lh dist/

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
          # Artifact is retained for 1 day — enough for deploy to consume it
          retention-days: 1
